<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Playlist Youtube — Panneau</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Systeme de design repris de Bestdwell (apps/admin) : Manrope, monochrome chaud, aucun accent colore. */
  :root {
    --font-sans: "Manrope", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --color-paper: #ffffff;
    --color-soft: #faf8f4;
    --color-soft2: #f2efe9;
    --color-ink: #181715;
    --color-mut: #6e6a62;
    --color-mut2: #a6a199;
    --color-rule: #ece9e3;
    --color-rule2: #dedad2;
  }
  html { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--color-paper); color: var(--color-ink);
    font-family: var(--font-sans);
    font-size: 14px; line-height: 1.5;
  }
  .tnum { font-variant-numeric: tabular-nums; }

  .topbar { border-bottom: 1px solid var(--color-rule); }
  .topbar-inner { max-width: 880px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .brand { font-weight: 700; font-size: 14px; letter-spacing: -.01em; }
  .btn-ghost {
    display: inline-flex; align-items: center; background: var(--color-paper); color: var(--color-ink);
    border: 1px solid var(--color-rule2); border-radius: 100px; padding: 6px 14px;
    font-size: 12.5px; font-weight: 600; text-decoration: none;
    transition: background .2s ease, border-color .2s ease;
  }
  .btn-ghost:hover { background: var(--color-soft); border-color: var(--color-ink); }

  .wrap { max-width: 880px; margin: 0 auto; padding: 32px 24px 64px; }
  h1 { font-size: 20px; font-weight: 700; margin: 0 0 4px; letter-spacing: -.01em; }
  .page-sub { color: var(--color-mut); font-size: 13px; margin: 0 0 28px; }

  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--color-mut); font-weight: 700; margin: 0 0 12px; }

  .dropzone {
    border: 1.5px dashed var(--color-rule2); border-radius: 12px; padding: 32px 20px; background: var(--color-paper);
    text-align: center; color: var(--color-mut); cursor: pointer; transition: border-color .2s, background .2s;
    margin-bottom: 16px; font-size: 13px;
  }
  .dropzone.drag { border-color: var(--color-ink); background: var(--color-soft2); color: var(--color-ink); }
  .dropzone strong { color: var(--color-ink); font-weight: 700; }
  .dropzone input { display: none; }

  .kind-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
  .kind-row label {
    font-size: 12.5px; font-weight: 600; padding: 7px 14px; border-radius: 100px; border: 1px solid var(--color-rule2);
    color: var(--color-mut); cursor: pointer; user-select: none; display: inline-block; background: var(--color-paper);
    transition: background .2s ease, color .2s ease, border-color .2s ease;
  }
  .kind-row input { display: none; }
  .kind-row label:has(input:checked) { border-color: var(--color-ink); color: var(--color-paper); background: var(--color-ink); }

  .progress { font-size: 12px; color: var(--color-mut); margin: -6px 0 20px; min-height: 1.2em; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .asset { background: var(--color-paper); border: 1px solid var(--color-rule); border-radius: 12px; overflow: hidden; }
  .asset .prev { aspect-ratio: 16/9; background: var(--color-soft2); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .asset .prev img, .asset .prev video { width: 100%; height: 100%; object-fit: cover; }
  .asset .prev .icon { font-size: 1.6rem; opacity: .3; }
  .asset .body { padding: 12px 14px; }
  .asset .name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .asset .meta { font-size: 11px; color: var(--color-mut); margin-top: 5px; display: flex; justify-content: space-between; }
  .badge {
    display: inline-block; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
    padding: 3px 9px; border-radius: 100px; margin-bottom: 8px;
    background: var(--color-soft2); color: var(--color-mut); border: 1px solid var(--color-rule2);
  }
  .row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .row a { color: var(--color-mut); font-size: 12px; text-decoration: none; }
  .row a:hover { color: var(--color-ink); }
  .row button {
    background: var(--color-paper); border: 1px solid var(--color-rule2); color: var(--color-mut);
    font-size: 11.5px; padding: 5px 10px; border-radius: 100px; cursor: pointer;
    transition: border-color .2s ease, color .2s ease;
  }
  .row button:hover { border-color: var(--color-ink); color: var(--color-ink); }
  .empty { color: var(--color-mut); font-size: 13px; padding: 16px 0; }

  .nav { display: flex; align-items: center; gap: 4px; }
  .nav a { color: var(--color-mut); font-size: 13px; font-weight: 600; text-decoration: none; padding: 6px 12px; border-radius: 100px; }
  .nav a:hover { color: var(--color-ink); background: var(--color-soft); }
  .nav a.active { color: var(--color-ink); background: var(--color-soft2); }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <span class="brand">The Playlist Youtube</span>
    <div class="topbar-right">
      <nav class="nav">
        <a href="/videos">Vidéos</a>
        <a href="/" class="active">Assets</a>
        <a href="/references">Chansons de référence</a>
      </nav>
      <a class="btn-ghost" href="#" id="logout">Déconnexion</a>
    </div>
  </div>
</div>
<div class="wrap">
  <h1>Assets</h1>
  <p class="page-sub">Bannières, clips et fonds utilisés dans les vidéos.</p>

  <h2>Déposer un asset</h2>
  <div class="kind-row">
    <label><input type="radio" name="kind" value="ad_banner_16x9"><span>Bannière 16:9</span></label>
    <label><input type="radio" name="kind" value="ad_clip_9x16" checked><span>Clip 9:16</span></label>
    <label><input type="radio" name="kind" value="background_image"><span>Image de fond</span></label>
    <label><input type="radio" name="kind" value="other"><span>Autre</span></label>
  </div>
  <div class="dropzone" id="dz">
    <strong>Clique ou dépose un fichier ici</strong><br>Vidéo, image — 45&nbsp;Mo max
    <input type="file" id="file">
  </div>
  <div class="progress" id="progress"></div>

  <h2>Assets déposés</h2>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">Aucun asset pour l'instant.</div>
</div>

<script>
const dz = document.getElementById('dz');
const fileInput = document.getElementById('file');
const progress = document.getElementById('progress');
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');

document.getElementById('logout').onclick = async (e) => {
  e.preventDefault();
  await fetch('/api/auth/logout', { method: 'POST' });
  location.href = '/login';
};

dz.onclick = () => fileInput.click();
['dragover', 'dragenter'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag'); }));
['dragleave', 'drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('drag'); }));
dz.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) upload(f); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) upload(fileInput.files[0]); });

async function upload(file) {
  const kind = document.querySelector('input[name="kind"]:checked').value;
  progress.textContent = 'Envoi de ' + file.name + '…';
  try {
    const r = await fetch('/api/assets/upload?kind=' + encodeURIComponent(kind) + '&filename=' + encodeURIComponent(file.name), {
      method: 'POST',
      headers: { 'content-type': file.type || 'application/octet-stream' },
      body: file
    });
    const d = await r.json();
    if (!d.ok) { progress.textContent = 'Erreur : ' + (d.error || 'inconnue'); return; }
    progress.textContent = 'OK — ' + file.name + ' ajouté.';
    fileInput.value = '';
    load();
  } catch (e) { progress.textContent = 'Erreur réseau : ' + e.message; }
}

const KIND_LABEL = { ad_banner_16x9: 'Bannière 16:9', ad_clip_9x16: 'Clip 9:16', background_image: 'Fond', other: 'Autre' };
function fmtSize(b) { if (!b) return '—'; const u = ['o', 'Ko', 'Mo', 'Go']; let i = 0; while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; } return b.toFixed(1) + ' ' + u[i]; }
function fmtDate(s) { return new Date(s).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' }); }

async function load() {
  const rows = await (await fetch('/api/assets')).json();
  grid.innerHTML = '';
  empty.style.display = rows.length ? 'none' : 'block';
  for (const a of rows) {
    const div = document.createElement('div');
    div.className = 'asset';
    const isImg = (a.mime_type || '').startsWith('image/');
    const isVid = (a.mime_type || '').startsWith('video/');
    div.innerHTML = `
      <div class="prev">${
        a.url && isImg ? '<img src="' + a.url + '" alt="">' :
        a.url && isVid ? '<video src="' + a.url + '" muted></video>' :
        '<span class="icon">📄</span>'
      }</div>
      <div class="body">
        <span class="badge">${KIND_LABEL[a.kind] || a.kind}</span>
        <div class="name" title="${a.filename}">${a.filename}</div>
        <div class="meta tnum"><span>${fmtSize(a.size_bytes)}</span><span>${fmtDate(a.uploaded_at)}</span></div>
        <div class="row">
          <a href="${a.url || '#'}" target="_blank">Aperçu ↗</a>
          <button data-id="${a.id}" data-path="${a.storage_path}">Supprimer</button>
        </div>
      </div>`;
    div.querySelector('button').onclick = async (e) => {
      const { id, path } = e.target.dataset;
      if (!confirm('Supprimer cet asset ?')) return;
      await fetch('/api/assets/delete', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ id, storage_path: path }) });
      load();
    };
    grid.appendChild(div);
  }
}
load();
</script>
</body>
</html>
